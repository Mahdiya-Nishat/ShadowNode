<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<title>AIoT Permission Honeypot Simulator</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0"></script>

<style>

body{
font-family:Arial, sans-serif;
background:#f2f2f2;
padding:30px;
}

h2{
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:20px;
}

button.permission{
border:1px solid #333;
background:white;
padding:10px;
cursor:pointer;
}

button.permission.selected{
background:#ddd;
}

#requestBtn{
padding:12px 18px;
font-size:16px;
cursor:pointer;
}

#requestBtn:disabled{
opacity:0.4;
cursor:not-allowed;
}

#appView{
margin-top:25px;
border:1px solid #999;
background:white;
padding:15px;
}

.dataRow{
font-family:monospace;
margin:6px 0;
}

</style>

</head>
<body>

<h2>Select Permissions</h2>

<div id="permGrid" class="grid"></div>

<button id="requestBtn" disabled>Request Data</button>

<div id="appView"></div>

<script>

/* ---------------- CONFIG ---------------- */

const FEATURE_COUNT = 215

let model
let MEAN=[]
let STD=[]

/* --------------- LOAD MODEL --------------- */

async function loadSystem(){

model = await tf.loadLayersModel("model.json")

const scaler = await fetch("scaler_params.json").then(r=>r.json())

MEAN = scaler.mean
STD = scaler.std

}

loadSystem()

/* --------------- PERMISSION UI --------------- */

const permissions = [

"SEND_SMS",
"READ_SMS",
"INTERNET",
"READ_CONTACTS",
"ACCESS_FINE_LOCATION",
"ACCESS_COARSE_LOCATION",
"CAMERA",
"RECORD_AUDIO",
"READ_PHONE_STATE",
"WRITE_EXTERNAL_STORAGE",
"READ_EXTERNAL_STORAGE",
"GET_ACCOUNTS",
"CALL_PHONE",
"ACCESS_WIFI_STATE",
"CHANGE_WIFI_STATE",
"READ_CALL_LOG"

]

const selected = new Set()

const grid = document.getElementById("permGrid")

permissions.forEach(p => {

const btn = document.createElement("button")

btn.className="permission"

btn.innerText=p

btn.onclick = () => {

if(selected.has(p)){

selected.delete(p)

btn.classList.remove("selected")

}else{

selected.add(p)

btn.classList.add("selected")

}

updateRequestButton()

}

grid.appendChild(btn)

})

/* -------- ENABLE REQUEST BUTTON -------- */

function updateRequestButton(){

const btn = document.getElementById("requestBtn")

btn.disabled = selected.size === 0

}

/* -------- BUILD FEATURE VECTOR -------- */

function buildVector(){

const vec = new Float32Array(FEATURE_COUNT).fill(0)

permissions.forEach((p,i)=>{

if(selected.has(p)) vec[i]=1

})

return vec

}

/* -------- SCALE INPUT -------- */

function scaleInput(vec){

const scaled = new Float32Array(FEATURE_COUNT)

for(let i=0;i<FEATURE_COUNT;i++){

const std = STD[i] === 0 ? 1 : STD[i]

scaled[i] = (vec[i] - MEAN[i]) / std

}

return scaled

}

/* -------- PREDICT MALWARE SCORE -------- */

async function predict(vec){

const scaled = scaleInput(vec)

const tensor = tf.tensor2d([Array.from(scaled)], [1, FEATURE_COUNT])

const pred = model.predict(tensor)

const score = (await pred.data())[0]

tensor.dispose()
pred.dispose()

return score

}

/* -------- GENERATE APP DATA -------- */

function generateAppData(isMalicious){

const view = document.getElementById("appView")

view.innerHTML=""

selected.forEach(p=>{

let value="sample-data"

if(p.includes("LOCATION")){

value = isMalicious ? "34.1021 , -118.342" : "22.5726 , 88.3639"

}

else if(p.includes("CONTACT")){

value = isMalicious ? "Contact: Alice" : "Contact: Mom"

}

else if(p.includes("SMS")){

value = isMalicious ? "SMS: test message" : "SMS: bank alert"

}

else if(p.includes("CAMERA")){

value = isMalicious ? "image_9021.jpg" : "camera.jpg"

}

const row = document.createElement("div")

row.className="dataRow"

row.innerText = p + " → " + value

view.appendChild(row)

})

}

/* -------- REQUEST DATA BUTTON -------- */

document.getElementById("requestBtn").onclick = async () => {

const vec = buildVector()

const score = await predict(vec)

const malicious = score > 0.7

generateAppData(malicious)

}

</script>

</body>
</html>
